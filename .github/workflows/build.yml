name: build

on:
  push:
    branches: [ JUCE ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Configure (universal)
        run: cmake -B juce/build -S juce -DCMAKE_BUILD_TYPE=Release
             -DCOPY_AFTER_BUILD=OFF -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
      - name: Build
        run: cmake --build juce/build --config Release --parallel
      - name: Verify universal binary
        run: lipo -info "juce/build/Megalo_artefacts/Release/AU/Megalo.component/Contents/MacOS/Megalo" || true
      - uses: actions/upload-artifact@v4
        with:
          name: Megalo-macOS-universal
          path: |
            juce/build/Megalo_artefacts/Release/AU/Megalo.component
            juce/build/Megalo_artefacts/Release/VST3/Megalo.vst3
            juce/build/Megalo_artefacts/Release/Standalone/Megalo.app

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B juce/build -S juce -DCMAKE_BUILD_TYPE=Release -DCOPY_AFTER_BUILD=OFF
      - name: Build
        run: cmake --build juce/build --config Release --parallel
      - uses: actions/upload-artifact@v4
        with:
          name: Megalo-Windows
          path: |
            juce/build/Megalo_artefacts/Release/VST3/Megalo.vst3
            juce/build/Megalo_artefacts/Release/Standalone/Megalo.exe
